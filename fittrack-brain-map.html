<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitTrack | Complete Neural Brain Map</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #010409;
            --frontend: #00ff89;
            --backend: #00d4ff;
            --data: #ff007a;
            --logic: #f59e0b;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'DM Sans', sans-serif;
            overflow: hidden;
            user-select: none;
        }

        canvas { display: block; cursor: crosshair; }

        .ui-header {
            position: fixed;
            top: 40px;
            left: 40px;
            pointer-events: none;
            z-index: 100;
        }

        h1 {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 64px;
            letter-spacing: 10px;
            margin: 0;
            color: var(--frontend);
            text-shadow: 0 0 30px rgba(0, 255, 137, 0.4);
        }

        .breadcrumb {
            color: #475569;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 5px;
        }

        .legend {
            position: fixed;
            bottom: 40px;
            right: 40px;
            background: rgba(13, 17, 23, 0.9);
            padding: 25px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .dot { width: 12px; height: 12px; border-radius: 4px; box-shadow: 0 0 10px currentColor; }

        .cluster-label {
            position: absolute;
            font-family: 'Bebas Neue';
            font-size: 24px;
            color: rgba(255, 255, 255, 0.1);
            pointer-events: none;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>

    <div class="ui-header">
        <h1>FULL STACK BRAIN</h1>
        <div class="breadcrumb">FitTrack • Core Architecture • File Connectivity</div>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background: var(--frontend); color: var(--frontend)"></div> FRONTEND (UI & COMPONENTS)</div>
        <div class="legend-item"><div class="dot" style="background: var(--logic); color: var(--logic)"></div> LOGIC (CONTEXT & MIDDLEWARE)</div>
        <div class="legend-item"><div class="dot" style="background: var(--backend); color: var(--backend)"></div> BACKEND (ROUTES & SERVER)</div>
        <div class="legend-item"><div class="dot" style="background: var(--data); color: var(--data)"></div> DATA (MODELS & DATABASE)</div>
    </div>

    <canvas id="brainCanvas"></canvas>

    <script>
        const canvas = document.getElementById('brainCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, offset = { x: 0, y: 0 };

        const nodes = [
            // FRONTEND CLUSTER
            { id: 'main.jsx', group: 'frontend', x: 0, y: -300, size: 8 },
            { id: 'App.jsx', group: 'frontend', x: 0, y: -200, size: 14 },
            { id: 'Dashboard.jsx', group: 'frontend', x: 100, y: -100, size: 10 },
            { id: 'Workouts.jsx', group: 'frontend', x: 200, y: -100, size: 8 },
            { id: 'Nutrition.jsx', group: 'frontend', x: 200, y: -20, size: 8 },
            { id: 'Profile.jsx', group: 'frontend', x: 200, y: 60, size: 8 },
            { id: 'AdminDashboard.jsx', group: 'frontend', x: 100, y: 100, size: 10 },
            { id: 'Sidebar.jsx', group: 'frontend', x: -100, y: -20, size: 8 },
            { id: 'Login.jsx', group: 'frontend', x: -200, y: -100, size: 9 },
            { id: 'Signup.jsx', group: 'frontend', x: -200, y: 20, size: 9 },
            { id: 'Loader.jsx', group: 'frontend', x: -100, y: 120, size: 6 },
            { id: 'SplashScreen.jsx', group: 'frontend', x: 0, y: -380, size: 7 },

            // LOGIC & CONFIG CLUSTER
            { id: 'AuthContext.jsx', group: 'logic', x: -150, y: -250, size: 11 },
            { id: 'api/config.js', group: 'logic', x: 0, y: 0, size: 9 },
            { id: 'authMiddleware.js', group: 'logic', x: -50, y: 350, size: 8 },

            // BACKEND CLUSTER
            { id: 'index.js (Server)', group: 'backend', x: 0, y: 200, size: 16 },
            { id: 'authRoutes.js', group: 'backend', x: -180, y: 300, size: 8 },
            { id: 'workoutRoutes.js', group: 'backend', x: -80, y: 300, size: 8 },
            { id: 'statsRoutes.js', group: 'backend', x: 80, y: 300, size: 8 },
            { id: 'mealRoutes.js', group: 'backend', x: 180, y: 300, size: 8 },
            { id: 'adminRoutes.js', group: 'backend', x: 220, y: 380, size: 8 },

            // DATA CLUSTER
            { id: 'User.js (Model)', group: 'data', x: -150, y: 480, size: 9 },
            { id: 'Workout.js (Model)', group: 'data', x: -50, y: 480, size: 9 },
            { id: 'DailyStats.js (Model)', group: 'data', x: 50, y: 480, size: 9 },
            { id: 'Meal.js (Model)', group: 'data', x: 150, y: 480, size: 9 },
            { id: 'Admin.js (Model)', group: 'data', x: 220, y: 520, size: 9 },
            { id: 'MongoDB Atlas', group: 'data', x: 0, y: 650, size: 22 },
        ];

        const links = [
            { s: 'main.jsx', t: 'App.jsx' },
            { s: 'App.jsx', t: 'AuthContext.jsx' },
            { s: 'App.jsx', t: 'SplashScreen.jsx' },
            { s: 'App.jsx', t: 'Dashboard.jsx' },
            { s: 'App.jsx', t: 'AdminDashboard.jsx' },
            { s: 'App.jsx', t: 'Login.jsx' },
            { s: 'App.jsx', t: 'Signup.jsx' },
            { s: 'Dashboard.jsx', t: 'Sidebar.jsx' },
            { s: 'Dashboard.jsx', t: 'Workouts.jsx' },
            { s: 'Dashboard.jsx', t: 'Nutrition.jsx' },
            { s: 'Dashboard.jsx', t: 'Profile.jsx' },
            { s: 'AdminDashboard.jsx', t: 'Loader.jsx' },
            
            // Logic to Connection
            { s: 'Dashboard.jsx', t: 'api/config.js' },
            { s: 'AdminDashboard.jsx', t: 'api/config.js' },
            { s: 'Login.jsx', t: 'api/config.js' },
            { s: 'api/config.js', t: 'index.js (Server)' },

            // Server to Routes
            { s: 'index.js (Server)', t: 'authRoutes.js' },
            { s: 'index.js (Server)', t: 'workoutRoutes.js' },
            { s: 'index.js (Server)', t: 'statsRoutes.js' },
            { s: 'index.js (Server)', t: 'mealRoutes.js' },
            { s: 'index.js (Server)', t: 'adminRoutes.js' },

            // Routes to Logic
            { s: 'workoutRoutes.js', t: 'authMiddleware.js' },
            { s: 'adminRoutes.js', t: 'authMiddleware.js' },

            // Routes to Models
            { s: 'authRoutes.js', t: 'User.js (Model)' },
            { s: 'workoutRoutes.js', t: 'Workout.js (Model)' },
            { s: 'statsRoutes.js', t: 'DailyStats.js (Model)' },
            { s: 'mealRoutes.js', t: 'Meal.js (Model)' },
            { s: 'adminRoutes.js', t: 'Admin.js (Model)' },

            // Models to Database
            { s: 'User.js (Model)', t: 'MongoDB Atlas' },
            { s: 'Workout.js (Model)', t: 'MongoDB Atlas' },
            { s: 'DailyStats.js (Model)', t: 'MongoDB Atlas' },
            { s: 'Meal.js (Model)', t: 'MongoDB Atlas' },
            { s: 'Admin.js (Model)', t: 'MongoDB Atlas' },
        ];

        // Initialize Physics
        nodes.forEach(n => {
            n.vx = 0; n.vy = 0;
            n.tx = n.x; n.ty = n.y;
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            offset.x = canvas.width / 2;
            offset.y = canvas.height / 2;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            ctx.fillStyle = '#010409';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Update Physics
            nodes.forEach(n => {
                n.vx += (n.tx - n.x) * 0.005;
                n.vy += (n.ty - n.y) * 0.005;
                n.vx += (Math.random() - 0.5) * 0.1;
                n.vy += (Math.random() - 0.5) * 0.1;
                n.x += n.vx; n.y += n.vy;
                n.vx *= 0.96; n.vy *= 0.96;
            });

            // Draw Links
            links.forEach(l => {
                const s = nodes.find(n => n.id === l.s);
                const t = nodes.find(n => n.id === l.t);
                const sx = s.x + offset.x, sy = s.y + offset.y;
                const tx = t.x + offset.x, ty = t.y + offset.y;

                ctx.beginPath();
                ctx.moveTo(sx, sy);
                ctx.lineTo(tx, ty);
                ctx.strokeStyle = getColor(s.group, 0.1);
                ctx.lineWidth = 1;
                ctx.stroke();

                // Particle
                const time = (Date.now() * 0.001) % 1;
                ctx.fillStyle = getColor(s.group, 0.4);
                ctx.beginPath();
                ctx.arc(sx + (tx - sx) * time, sy + (ty - sy) * time, 1.5, 0, Math.PI * 2);
                ctx.fill();
            });

            // Draw Nodes
            nodes.forEach(n => {
                const x = n.x + offset.x, y = n.y + offset.y;
                
                const grad = ctx.createRadialGradient(x, y, 0, x, y, n.size * 4);
                grad.addColorStop(0, getColor(n.group, 0.15));
                grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad;
                ctx.beginPath();
                ctx.arc(x, y, n.size * 4, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = getColor(n.group, 1);
                ctx.beginPath();
                ctx.arc(x, y, n.size, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = 'rgba(255,255,255,0.7)';
                ctx.font = '700 9px DM Sans';
                ctx.textAlign = 'center';
                ctx.fillText(n.id, x, y + n.size + 15);
            });

            requestAnimationFrame(draw);
        }

        function getColor(group, a) {
            if (group === 'frontend') return `rgba(0, 255, 137, ${a})`;
            if (group === 'backend') return `rgba(0, 212, 255, ${a})`;
            if (group === 'data') return `rgba(255, 0, 122, ${a})`;
            if (group === 'logic') return `rgba(245, 158, 11, ${a})`;
            return `rgba(255,255,255,${a})`;
        }

        let isDragging = false, lastM = { x: 0, y: 0 };
        canvas.onmousedown = e => { isDragging = true; lastM = { x: e.clientX, y: e.clientY }; };
        window.onmousemove = e => {
            if (isDragging) {
                offset.x += e.clientX - lastM.x;
                offset.y += e.clientY - lastM.y;
                lastM = { x: e.clientX, y: e.clientY };
            }
        };
        window.onmouseup = () => isDragging = false;

        draw();
    </script>
</body>
</html>
